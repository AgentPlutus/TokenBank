name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Python checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest

      - name: Validate config
        run: uv run tokenbank config validate

      - name: Verify committed schemas are current
        run: |
          uv run tokenbank schemas export --output-dir schemas
          git diff --exit-code -- schemas

      - name: Smoke demo runner
        run: |
          uv run tokenbank demo capacity run --all --json \
            --db-path /tmp/tokenbank_ci_demo.db \
            > /tmp/tokenbank_ci_demo.json
          uv run python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("/tmp/tokenbank_ci_demo.json").read_text())
          assert payload["status"] == "ok"
          assert payload["task_count"] == 5
          PY
