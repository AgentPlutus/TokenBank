capacity_registry:
  worker_manifests:
    - worker_id: wrk_demo_local
      capacity_node_id: capnode:worker:wrk_demo_local
      manifest_hash: worker_demo_local
      identity: Demo local worker
      backend_ids:
        - backend:url_check:v0
        - backend:browser_fetch:v0
        - backend:dedup:local_script:v0
        - backend:webpage_extraction:browser_fetch:v0
      backend_classes:
        - local_tool
        - local_script
        - browser_fetch
      allowed_task_types:
        - url_check
        - dedup
        - webpage_extraction
      allowed_data_labels:
        - public_url
      allowed_privacy_levels:
        - private
      execution_location: windows_worker
      trust_level: trusted_private
      health_status: healthy
    - worker_id: wrk_control_plane_gateway
      capacity_node_id: capnode:worker:wrk_control_plane_gateway
      manifest_hash: worker_control_plane_gateway
      identity: Control Plane Gateway
      backend_ids:
        - backend:api_model_gateway:l1_structured
        - backend:topic_classification:api_gateway:v0
        - backend:claim_extraction:api_gateway:v0
        - backend:primary_model_gateway:v0
        - backend:claim_extraction:primary_gateway:v0
      backend_classes:
        - api_model_gateway
        - primary_model_gateway
      allowed_task_types:
        - structured_summary
        - topic_classification
        - claim_extraction
      allowed_data_labels:
        - public_url
      allowed_privacy_levels:
        - private
      execution_location: mac_control_plane
      trust_level: control_plane
      health_status: healthy
  capacity_nodes:
    - capacity_node_id: capnode:worker:wrk_demo_local
      source: worker_manifest
      worker_id: wrk_demo_local
      manifest_hash: worker_demo_local
    - capacity_node_id: capnode:worker:wrk_control_plane_gateway
      source: worker_manifest
      worker_id: wrk_control_plane_gateway
      manifest_hash: worker_control_plane_gateway
    - capacity_node_id: capnode:tool:url_check:v0
      source: backend_manifest
      backend_id: backend:url_check:v0
      manifest_hash: backend_url_check_v0
    - capacity_node_id: capnode:tool:browser_fetch:v0
      source: backend_manifest
      backend_id: backend:browser_fetch:v0
      manifest_hash: backend_browser_fetch_v0
    - capacity_node_id: capnode:script:dedup:v0
      source: backend_manifest
      backend_id: backend:dedup:local_script:v0
      manifest_hash: backend_dedup_local_script_v0
    - capacity_node_id: capnode:browser_fetch:webpage_extraction:v0
      source: backend_manifest
      backend_id: backend:webpage_extraction:browser_fetch:v0
      manifest_hash: backend_webpage_extraction_browser_fetch_v0
    - capacity_node_id: capnode:api_gateway:l1_structured
      source: backend_manifest
      backend_id: backend:api_model_gateway:l1_structured
      manifest_hash: backend_api_gateway_l1
    - capacity_node_id: capnode:api_gateway:topic_classification:v0
      source: backend_manifest
      backend_id: backend:topic_classification:api_gateway:v0
      manifest_hash: backend_topic_classification_api_gateway_v0
    - capacity_node_id: capnode:api_gateway:claim_extraction:v0
      source: backend_manifest
      backend_id: backend:claim_extraction:api_gateway:v0
      manifest_hash: backend_claim_extraction_api_gateway_v0
    - capacity_node_id: capnode:primary_gateway:v0
      source: backend_manifest
      backend_id: backend:primary_model_gateway:v0
      manifest_hash: backend_primary_gateway_v0
    - capacity_node_id: capnode:primary_gateway:claim_extraction:v0
      source: backend_manifest
      backend_id: backend:claim_extraction:primary_gateway:v0
      manifest_hash: backend_claim_extraction_primary_gateway_v0
