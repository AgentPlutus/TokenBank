verifier_recipe:
  verifier_recipe_id: claim_extraction_v0
  task_type: claim_extraction
  output_schema:
    type: object
    required:
      - claims
    properties:
      claims:
        type: array
        items:
          type: object
          properties:
            claim_text:
              type: string
            entity:
              type: string
            claim_type:
              type: string
              enum:
                - factual
                - metric
                - policy
                - product
                - other
            confidence:
              type: number
              minimum: 0
              maximum: 1
            source_post_refs:
              type: array
              items:
                type: string
            evidence_hint:
              type: string
      source_ids:
        type: array
        items:
          type: string
      allowed_claim_types:
        type: array
        items:
          type: string
  recommendations:
    hash_mismatch: quarantine
    output_hash_missing: reject
    schema_invalid: retry
    secret_detected: quarantine
    missing_entity: retry
    missing_source_ref: fallback
    valid_claims: accept
    default_failure: reject
  sampled_audit_rate_bps: 0
