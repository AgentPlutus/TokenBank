verifier_recipe:
  verifier_recipe_id: webpage_extraction_v0
  task_type: webpage_extraction
  output_schema:
    type: object
    required:
      - extracted
    properties:
      extracted:
        type: object
      prompt_injection_detected:
        type: boolean
      untrusted_content:
        type: boolean
  recommendations:
    hash_mismatch: quarantine
    output_hash_missing: reject
    schema_invalid: retry
    secret_detected: quarantine
    empty: fallback
    prompt_injection: accept_with_warning
    extracted: accept
    default_failure: reject
  sampled_audit_rate_bps: 0
